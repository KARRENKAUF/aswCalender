name: Build and publish ASW ICS

on:
  schedule:
    # ----------------------------------------------------
    # --- WINTER TIME (CET / UTC+1) LOGIC: Nov - Mar ---
    # Runs in months 1,2,3,11,12 (Jan, Feb, Mar, Nov, Dec). DE Time = UTC Hour + 1
    # ----------------------------------------------------
    - cron: "*/10 5-20 *  1,2,3,11,12 1-6"
    
    # ----------------------------------------------------
    # --- SUMMER TIME (CEST / UTC+2) LOGIC: Apr - Oct ---
    # Runs in months 4-10 (Apr-Oct). DE Time = UTC Hour + 2
    # ----------------------------------------------------
    - cron: "*/10 5-20 * 4-10 1-6"
  workflow_dispatch:

concurrency:
  group: asw-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Generate ICS and site
        run: |
          go mod download
          go run .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
