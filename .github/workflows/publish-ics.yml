name: Build and publish ASW ICS

on:
  schedule:
    # ----------------------------------------------------
    # --- WINTER TIME (CET / UTC+1) LOGIC: Nov - Mar ---
    # Runs in months 1,2,3,11,12 (Jan, Feb, Mar, Nov, Dec). DE Time = UTC Hour + 1
    # ----------------------------------------------------
    # 30-Minuten-Intervalle:
    - cron: "0,30 5 * 1,2,3,11,12 1-5"      # 06:00 - 07:00 CET (Mon-Fri)
    - cron: "0,30 8-9 * 1,2,3,11,12 1-5"    # 09:00 - 11:00 CET (Mon-Fri)
    - cron: "0 10 * 1,2,3,11,12 1-5"       # 11:00 CET (exact start)
    - cron: "0,30 12-13 * 1,2,3,11,12 1-5" # 13:00 - 15:00 CET (Mon-Fri)
    - cron: "0 14 * 1,2,3,11,12 1-5"       # 15:00 CET (exact start)
    - cron: "0,30 15-20 * 1,2,3,11,12 1-5" # 16:00 - 22:00 CET (Mon-Fri)
    - cron: "0 21 * 1,2,3,11,12 1-5"        # 22:00 CET (final trigger)
    # 15-Minuten-Intervalle (Lückenfüller):
    - cron: "*/15 6-7 * 1,2,3,11,12 1-5"    # 07:00 - 09:00 CET (Mon-Fri)
    - cron: "*/15 10-11 * 1,2,3,11,12 1-5"  # 11:00 - 13:00 CET (Mon-Fri)
    - cron: "*/15 14 * 1,2,3,11,12 1-5"     # 15:00 - 16:00 CET (Mon-Fri)

    # ----------------------------------------------------
    # --- SUMMER TIME (CEST / UTC+2) LOGIC: Apr - Oct ---
    # Runs in months 4-10 (Apr-Oct). DE Time = UTC Hour + 2
    # ----------------------------------------------------
    # 30-Minuten-Intervalle:
    - cron: "0,30 4 * 4-10 1-5"      # 06:00 - 07:00 CEST (Mon-Fri)
    - cron: "0,30 7-8 * 4-10 1-5"    # 09:00 - 11:00 CEST (Mon-Fri)
    - cron: "0 9 * 4-10 1-5"        # 11:00 CEST (exact start)
    - cron: "0,30 11-12 * 4-10 1-5"  # 13:00 - 15:00 CEST (Mon-Fri)
    - cron: "0 13 * 4-10 1-5"        # 15:00 CEST (exact start)
    - cron: "0,30 14-19 * 4-10 1-5"  # 16:00 - 22:00 CEST (Mon-Fri)
    - cron: "0 20 * 4-10 1-5"        # 22:00 CEST (final trigger)
    # 15-Minuten-Intervalle (Lückenfüller):
    - cron: "*/15 5-6 * 4-10 1-5"    # 07:00 - 09:00 CEST (Mon-Fri)
    - cron: "*/15 9-10 * 4-10 1-5"   # 11:00 - 13:00 CEST (Mon-Fri)
    - cron: "*/15 13 * 4-10 1-5"     # 15:00 - 16:00 CEST (Mon-Fri)
  workflow_dispatch:

concurrency:
  group: asw-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Generate ICS and site
        run: |
          go mod download
          go run .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
